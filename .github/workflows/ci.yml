name: Kiem Thu Tu Dong

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    # Khởi tạo một database ảo trên GitHub để chạy Integration Test
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
    - uses: actions/checkout@v3
    
    - name: Cài đặt Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        
    - name: Cài đặt thư viện
      working-directory: ./backend  # Thay bằng tên thư mục chứa package.json của bạn
      run: npm install
      
    - name: Chạy Test tự động
      working-directory: ./backend
      env: # Khai báo biến môi trường ảo dùng riêng cho lúc test
        MONGO_URI: mongodb://localhost:27017/test_db
        JWT_SECRET: secret_test_abc123
        PORT: 8080
      run: npm test