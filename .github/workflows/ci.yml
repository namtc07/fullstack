name: Kiem Thu Tu Dong

on:
  push:
    # branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    # Khởi tạo một database ảo trên GitHub để chạy Integration Test
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3
    
    - name: Cài đặt Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        
    - name: Cài đặt thư viện
      working-directory: ./backend  # Thay bằng tên thư mục chứa package.json của bạn
      run: npm install
      
    - name: Chạy Test tự động
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://root:password@localhost:5432/test_db
        JWT_SECRET: secret_test_abc123
        PORT: 8080
      run: |
        npx prisma db push
        npm test